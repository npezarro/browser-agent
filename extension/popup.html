<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 12px; font-family: system-ui, sans-serif; font-size: 13px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    .status { padding: 4px 8px; border-radius: 4px; margin-bottom: 12px; font-weight: 500; }
    .status.connected { background: #dcfce7; color: #166534; }
    .status.disconnected { background: #fee2e2; color: #991b1b; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input { width: 100%; padding: 6px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
    button { width: 100%; padding: 8px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h3>Browser Agent Extension</h3>
  <div id="status" class="status disconnected">Disconnected</div>
  <label for="url">Relay URL</label>
  <input id="url" type="text" placeholder="https://pezant.ca/api/browser-agent" />
  <label for="key">API Key</label>
  <input id="key" type="password" placeholder="BROWSER_AGENT_KEY" />
  <button id="save">Save & Connect</button>
  <script src="popup.js"></script>
</body>
</html>
